<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satsankalp Quiz & Flashcards</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    
    <header>
        <div class="quote-container">
            <h2 id="motivational-quote">"Ham Badlenge – Yug Badlega"</h2>
        </div>
        <div class="mode-toggle">
            <button id="quiz-btn" class="active">Quiz Mode</button>
            <button id="flashcard-btn">Flashcard Mode</button>
        </div>
    </header>

    <div class="app-layout">
        <main id="app-container">
            <!-- Quiz Section -->
            <section id="quiz-section" class="active">
                <div class="quiz-header">
                    <span id="progress">Question 1/25</span>
                    <div class="timer-container">
                        <span id="timer-label">Time: </span>
                        <span id="timer">60</span>
                        <button id="manual-timer-btn">Start Timer</button>
                    </div>
                </div>

                <div class="card quiz-card">
                    <div id="question-container">
                        <h3 id="question-text">HINDI QUESTION HERE</h3>
                        <div id="options-container">
                            <!-- Options will be injected here -->
                        </div>
                    </div>
                    <div id="explanation-container" class="hidden">
                        <hr>
                        <p id="explanation-text"></p>
                    </div>
                </div>

                <div class="quiz-footer">
                    <button id="next-btn" class="hidden">Next Question</button>
                    <div id="score-container">
                        Your Score: <span id="current-score">0</span>
                    </div>
                </div>
            </section>

            <!-- Flashcard Section -->
            <section id="flashcard-section">
                <div class="flashcard-container" id="flashcard">
                    <div class="flashcard-inner">
                        <div class="flashcard-front">
                            <p id="fc-front-text">HINDI SANKALP HERE</p>
                            <small>Click to flip</small>
                        </div>
                        <div class="flashcard-back">
                            <p id="fc-back-text">HINDI EXPLANATION HERE</p>
                            <small>Click to flip</small>
                        </div>
                    </div>
                </div>
                <div class="flashcard-controls">
                    <button id="prev-fc-btn">Previous</button>
                    <span id="fc-progress">Card 1/25</span>
                    <button id="next-fc-btn">Next</button>
                </div>
            </section>

            <!-- Results Section -->
            <section id="result-section">
                <div class="card result-card">
                    <h3>Quiz Finished!</h3>
                    <div id="winners-container" class="winners-display">
                        <!-- Winners will be injected here -->
                    </div>
                    <button id="restart-btn">Restart Quiz</button>
                </div>
            </section>
        </main>

        <!-- Student Tracker Sidebar -->
        <aside id="student-sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3>Student Scores</h3>
                <button id="add-student-btn" title="Add Student">+</button>
            </div>
            <div id="students-list" class="students-list">
                <!-- Students will be injected here -->
            </div>
            <div class="sidebar-help">
                <small>Click name to increase score</small>
            </div>
        </aside>
    </div>

    <footer>
        <div class="settings">
            <label class="switch">
                <input type="checkbox" id="timer-toggle">
                <span class="slider round"></span>
            </label>
            <span>Auto-Timer Toggle</span>
        </div>
    </footer>

    <!-- Correct/Wrong UI feedback -->
    <div id="feedback-overlay"></div>

    <script src="script.js"></script>
    <div id="detail-tooltip" class="tooltip hidden">
        <div class="tooltip-content">
            <h4 id="tooltip-title">Satsankalp Details</h4>
            <div id="tooltip-meaning-section">
                <strong>Meaning:</strong>
                <p id="tooltip-meaning"></p>
            </div>
            <div id="tooltip-process-section">
                <strong>Process:</strong>
                <ul id="tooltip-process"></ul>
            </div>
        </div>
    </div>
</body>
</html>
